<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script async src="script.js"></script>
    <link rel="stylesheet" href="./stylesheet.css">
    <title>STORE</title>
    <meta name="description" content="shopping store">
</head>
<body>
<main class="main-shop">
<header class="header-store header">
    <h1 class="title-store">STORE</h1>
    <div class="nav-div">
        <nav class="nav nav-store">
            <ul class="list">
                <li><a href="index.html">HOME</a></li>
                <li><a href="store.html">STORE</a></li>
                <li><a href="about.html">ABOUT</a></li>
            </ul>
        </nav>
    </div>
</header>
</main>
<section class="shopping-items snickers-section">
    <div class="shopping-item">
        <h2 class="item-head">Snickers</h2>
        <img alt="snickers bar" src="./snickers.png" class="snickers item-image"><br>
        <button class="add-to-cart">ADD TO CART</button><p class="price">2$</p>
    </div>
</section>
<br><br><br><br><br>
<section class="shopping-items coffee-section">
    <div class="shopping-item">
        <h2 class="item-head">Coffee</h2>
        <img alt="Coffee" src="./download.jfif" class="coffee item-image"><br>
        <button class="add-to-cart">ADD TO CART</button><p class="price">19.99$</p>
    </div>
</section>
<br><br><br><br><br>
<section class="shopping-items sand-section">
    <div class="shopping-item">
        <h2 class="item-head">Sand</h2>
        <img alt="Sand" src="./sand.jfif" class="sand item-image"><br>
        <button class="add-to-cart">ADD TO CART</button><p class="price">5.99$</p>
    </div>
</section>
<br><br><br><br><br>
<section class="cart">
    <h2 class="cartitle">CART</h2>
    <div class="cart-items-all">
    </div>
    <div class="total">
        <span class="total-text">Total: </span><span class="total-value">$0</span>
    </div>
    <div class="BUY-BTN">
        <button type="submit" class="buy">BUY CART ITEMS</button>\
     </div>
</section>
</body>
</html>
